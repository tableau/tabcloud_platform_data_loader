# mappings/transformer/background_jobs.yaml
# Unified pipeline: union of background_job and bridge_job event types.
# All common site event attributes are included, plus all fields from each event type.
# Fields present in only one event type will be null for rows from the other.
# Note: siteId is integer in background_job but string in bridge_job; unified as string.
#
# folder_pattern uses ** (globstar) to match eventType directories at any depth in the
# extract tree (e.g. pod=.../siteLuid=.../yyyy/mm/dd/hh/eventType=background_job/...).
# ** matches zero or more path segments; * matches exactly one segment.

output_filename: "background_jobs"

output:
  format: "parquet"
  target_path: ""
  partition_by: []
  schema:
    # --- Common attributes (all site events) ---
    - field: "eventTime"
      type: "datetime"
    - field: "eventProcessedTime"
      type: "datetime"
    - field: "eventType"
      type: "string"
    - field: "actorUserId"
      type: "int64"
    - field: "actorUserLuid"
      type: "string"
    - field: "eventOutcome"
      type: "string"
    - field: "eventOutcomeReason"
      type: "string"
    - field: "initiatingUserId"
      type: "int64"
    - field: "initiatingUserLuid"
      type: "string"
    - field: "licensingRoleName"
      type: "string"
    - field: "siteLuid"
      type: "string"
    - field: "siteRoleId"
      type: "int64"
    - field: "systemAdminLevel"
      type: "int64"

    # --- Shared fields (present in both background_job and bridge_job) ---
    - field: "eventState"
      type: "string"
    - field: "jobId"
      type: "int64"
    - field: "jobLuid"
      type: "string"
    - field: "jobType"
      type: "string"
    - field: "duration"
      type: "int64"
    - field: "notes"
      type: "string"
    - field: "objLuid"
      type: "string"
    - field: "objName"
      type: "string"
    - field: "objRepositoryUrl"
      type: "string"
    - field: "objRevision"
      type: "string"
    - field: "objType"
      type: "string"
    - field: "siteName"
      type: "string"

    # --- background_job only fields ---
    - field: "args"
      type: "string"
    - field: "eventInitiatedTime"
      type: "datetime"
    - field: "isRunNow"
      type: "boolean"
    - field: "objOwnerLuid"
      type: "string"
    - field: "objOwnerName"
      type: "string"
    - field: "objSize"
      type: "int64"
    - field: "podName"
      type: "string"
    - field: "projectLuid"
      type: "string"
    - field: "projectName"
      type: "string"
    - field: "projectOwnerEmail"
      type: "string"
    - field: "projectOwnerLuid"
      type: "string"
    - field: "scheduleLuid"
      type: "string"
    - field: "scheduleName"
      type: "string"
    - field: "taskId"
      type: "int64"
    - field: "taskLuid"
      type: "string"
    - field: "timeZone"
      type: "int64"

    # --- bridge_job only fields ---
    - field: "bridgeClientComputerName"
      type: "string"
    - field: "bridgeClientDeviceLuid"
      type: "string"
    - field: "bridgeClientOwnerLuid"
      type: "string"
    - field: "bridgeClientOwnerName"
      type: "string"
    - field: "bridgeClientVersion"
      type: "string"
    - field: "poolId"
      type: "string"
    - field: "poolName"
      type: "string"

inputs:
  - eventType: "background_job"
    source:
      folder_pattern: "**/eventType=background_job"
      file_pattern: "*.*"
      recursive: true
    mappings:
      # Common attributes
      eventTime: "eventTime"
      eventProcessedTime: "eventProcessedTime"
      eventType: $eventType
      actorUserId: "actorUserId"
      actorUserLuid: "actorUserLuid"
      eventOutcome: "eventOutcome"
      eventOutcomeReason: "eventOutcomeReason"
      initiatingUserId: "initiatingUserId"
      initiatingUserLuid: "initiatingUserLuid"
      licensingRoleName: "licensingRoleName"
      siteLuid: "siteLuid"
      siteRoleId: "siteRoleId"
      systemAdminLevel: "systemAdminLevel"
      # Shared fields
      eventState: "eventState"
      jobId: "jobId"
      jobLuid: "jobLuid"
      jobType: "jobType"
      duration: "duration"
      notes: "notes"
      objLuid: "objLuid"
      objName: "objName"
      objRepositoryUrl: "objRepositoryUrl"
      objRevision: "objRevision"
      objType: "objType"
      siteId: "siteId"
      siteName: "siteName"
      # background_job only
      args: "args"
      eventInitiatedTime: "eventInitiatedTime"
      isRunNow: "isRunNow"
      objOwnerLuid: "objOwnerLuid"
      objOwnerName: "objOwnerName"
      objSize: "objSize"
      podName: "podName"
      projectLuid: "projectLuid"
      projectName: "projectName"
      projectOwnerEmail: "projectOwnerEmail"
      projectOwnerLuid: "projectOwnerLuid"
      scheduleLuid: "scheduleLuid"
      scheduleName: "scheduleName"
      taskId: "taskId"
      taskLuid: "taskLuid"
      timeZone: "timeZone"
      # bridge_job only (not present — will be null for background_job rows)
      bridgeClientComputerName: ""
      bridgeClientDeviceLuid: ""
      bridgeClientOwnerLuid: ""
      bridgeClientOwnerName: ""
      bridgeClientVersion: ""
      poolId: ""
      poolName: ""

  - eventType: "bridge_job"
    source:
      folder_pattern: "**/eventType=bridge_job"
      file_pattern: "*.*"
      recursive: true
    mappings:
      # Common attributes
      eventTime: "eventTime"
      eventProcessedTime: "eventProcessedTime"
      eventType: $eventType
      actorUserId: "actorUserId"
      actorUserLuid: "actorUserLuid"
      eventOutcome: "eventOutcome"
      eventOutcomeReason: "eventOutcomeReason"
      initiatingUserId: "initiatingUserId"
      initiatingUserLuid: "initiatingUserLuid"
      licensingRoleName: "licensingRoleName"
      siteLuid: "siteLuid"
      siteRoleId: "siteRoleId"
      systemAdminLevel: "systemAdminLevel"
      # Shared fields
      eventState: "eventState"
      jobId: "jobId"
      jobLuid: "jobLuid"
      jobType: "jobType"
      duration: "duration"
      notes: "notes"
      objLuid: "objLuid"
      objName: "objName"
      objRepositoryUrl: "objRepositoryUrl"
      objRevision: "objRevision"
      objType: "objType"
      siteId: "siteId"
      siteName: "siteName"
      # background_job only (not present — will be null for bridge_job rows)
      args: ""
      eventInitiatedTime: ""
      isRunNow: ""
      objOwnerLuid: ""
      objOwnerName: ""
      objSize: ""
      podName: ""
      projectLuid: ""
      projectName: ""
      projectOwnerEmail: ""
      projectOwnerLuid: ""
      scheduleLuid: ""
      scheduleName: ""
      taskId: ""
      taskLuid: ""
      timeZone: ""
      # bridge_job only
      bridgeClientComputerName: "bridgeClientComputerName"
      bridgeClientDeviceLuid: "bridgeClientDeviceLuid"
      bridgeClientOwnerLuid: "bridgeClientOwnerLuid"
      bridgeClientOwnerName: "bridgeClientOwnerName"
      bridgeClientVersion: "bridgeClientVersion"
      poolId: "poolId"
      poolName: "poolName"
